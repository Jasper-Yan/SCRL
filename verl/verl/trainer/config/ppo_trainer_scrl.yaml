hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_


# Custom validation reward function configuration (simpler version for validation)
custom_val_reward_function:
  path: null
  name: compute_score
  
scrl:
  # Whether to enable SCRL, refer to (https://arxiv.org/abs/2603.19880)
  enable: false

  # Number of rollouts per prompt, used for actual training
  n_samples_per_prompt: ${actor_rollout_ref.rollout.n}

  # Number of rollouts per prompt, used for label voting
  n_votes_per_prompt: ${actor_rollout_ref.rollout.n}

  # SCRL parameters
  # Pseudo-positive label thresholds
  tau_pos: 0.5              # Minimum proportion for pseudo-positive label
  tau_marg: 0.15            # Margin between top-2 answers
  tau_low_min: 0.15         # Minimum threshold for low proportion
  
  # Reward configuration
  reward_mode: "binary"     # Reward mode: "binary" or "continuous"
  a_plus: 1.0              # Positive reward scaling factor
  a_minus: 1.0             # Negative reward scaling factor
  lambda_h: 0.1            # Entropy penalty weight (for continuous mode)